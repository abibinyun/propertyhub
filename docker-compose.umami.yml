# Umami Analytics — Self-hosted
# Jalankan: docker compose -f docker-compose.umami.yml up -d
#
# Setelah jalan:
# 1. Buka http://localhost:3002
# 2. Login: admin / umami
# 3. Settings → Websites → Add Website → isi nama & domain
# 4. Copy Website ID
# 5. Buka Admin Panel PropertyHub → Pengaturan → Analytics
# 6. Isi Umami URL + Site ID → Simpan

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: change-this-to-random-secret
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  umami_db_data:
